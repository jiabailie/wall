# Base runtime mode.
mode=paper

# Exchange settings.
exchange.name=binance
instruments=BTCUSDT,ETHUSDT

# Redis cache settings.
redis.host=localhost
redis.port=6379

# PostgreSQL durable store settings.
postgres.host=localhost
postgres.port=5432
postgres.database=trading
postgres.user=trading_user
postgres.password=trading_pass

# Kafka transaction-ingestion settings.
kafka.brokers=localhost:9092
kafka.transaction_topic=trading-transactions
kafka.consumer_group=trading-engine

# Risk settings.
risk.max_order_quantity=1.0
risk.max_order_notional=50000.0
risk.max_position_quantity=2.0
risk.stale_after_ms=5000
risk.kill_switch_enabled=false

# Strategy settings.
strategy.id=sample-threshold
strategy.trigger_instrument_id=mock:binance:BTCUSDT
strategy.trigger_price=42015.0
strategy.order_quantity=0.05
strategy.side=buy

# Simulation settings.
simulation.partial_fill_threshold=0.10
simulation.partial_fill_ratio=0.50
simulation.auto_complete_partial_fills=true
